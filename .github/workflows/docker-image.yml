# 自动构建并发布蓬莱 Docker 镜像到 GHCR(免费,用仓库自带 GITHUB_TOKEN,零额外注册)。
# 仅在 PenglaiAgent 发行仓库运行(开发私库与 GenericAgent 公开 fork 不构建)。
name: docker-image
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    if: github.repository == 'kevinchennewbee/PenglaiAgent'
    runs-on: ubuntu-latest
    steps:
      # actions 全部钉 commit SHA(防 tag 漂移投毒),注释为人读版本;均已是 Node24 运行时
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          # 同时打 sha 版本 tag:坏的 :latest 可回滚到上一个 sha- 镜像
          # (核心依赖 import 冒烟在 Dockerfile RUN 内,双架构构建都跑,装坏即构建失败不发布)
          tags: |
            ghcr.io/kevinchennewbee/penglai:latest
            ghcr.io/kevinchennewbee/penglai:sha-${{ github.sha }}
